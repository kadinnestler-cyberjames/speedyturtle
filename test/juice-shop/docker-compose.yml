services:
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: speedyturtle-juice-shop
    ports:
      - "3001:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=unsafe
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/rest/admin/application-version"]
      interval: 10s
      timeout: 5s
      retries: 3
