<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="speedyturtle circuit">
  <title>speedyturtle · circuit</title>
  <rect width="256" height="256" fill="#052e16"/>
  <!-- Speed streaks (electric trace) -->
  <g stroke="#a3e635" stroke-linecap="round" fill="none">
    <path d="M 14 118 L 38 118 L 44 124 L 58 124" stroke-width="3"/>
    <path d="M 6 138 L 30 138 L 36 144 L 62 144" stroke-width="3"/>
    <path d="M 20 158 L 44 158 L 50 152 L 60 152" stroke-width="3"/>
  </g>
  <g fill="#a3e635">
    <circle cx="44" cy="124" r="2"/><circle cx="36" cy="144" r="2"/><circle cx="50" cy="152" r="2"/>
  </g>
  <!-- Legs -->
  <ellipse cx="100" cy="190" rx="14" ry="10" fill="#022c22"/>
  <ellipse cx="200" cy="190" rx="14" ry="10" fill="#022c22"/>
  <!-- Body -->
  <ellipse cx="150" cy="142" rx="78" ry="40" fill="#022c22"/>
  <!-- Head -->
  <circle cx="222" cy="128" r="22" fill="#022c22"/>
  <!-- LED-eye -->
  <circle cx="225" cy="124" r="4" fill="#a3e635"/>
  <circle cx="225" cy="124" r="2" fill="#f0fdf4"/>
  <!-- Shell as PCB -->
  <path d="M 78 142 A 72 64 0 0 1 222 142 Z" fill="#14532d"/>
  <!-- Circuit traces -->
  <g stroke="#a3e635" stroke-width="1.5" fill="none">
    <path d="M 90 140 L 110 140 L 110 122 L 130 122 L 130 100 L 170 100 L 170 122 L 190 122 L 190 140 L 210 140"/>
    <path d="M 100 140 L 100 130 L 120 130 L 120 110"/>
    <path d="M 200 140 L 200 130 L 180 130 L 180 110"/>
    <path d="M 140 140 L 140 130 L 160 130 L 160 140"/>
  </g>
  <!-- Solder pads / components -->
  <g fill="#a3e635">
    <circle cx="110" cy="140" r="3"/><circle cx="130" cy="122" r="3"/><circle cx="170" cy="122" r="3"/><circle cx="190" cy="140" r="3"/>
    <circle cx="100" cy="130" r="3"/><circle cx="120" cy="110" r="3"/><circle cx="180" cy="110" r="3"/><circle cx="200" cy="130" r="3"/>
    <circle cx="150" cy="100" r="3"/>
  </g>
  <!-- IC chip -->
  <rect x="140" y="126" width="20" height="14" fill="#0f172a" stroke="#a3e635" stroke-width="1"/>
  <g fill="#a3e635">
    <rect x="138" y="128" width="2" height="2"/><rect x="138" y="132" width="2" height="2"/><rect x="138" y="136" width="2" height="2"/>
    <rect x="160" y="128" width="2" height="2"/><rect x="160" y="132" width="2" height="2"/><rect x="160" y="136" width="2" height="2"/>
  </g>
  <path d="M 78 142 A 72 64 0 0 1 222 142" stroke="#a3e635" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
