<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="speedyturtle hacker">
  <title>speedyturtle · hacker</title>
  <rect width="256" height="256" fill="#0a0a0a"/>
  <!-- Speed streaks (terminal green) -->
  <g stroke="#22c55e" stroke-linecap="round" fill="none">
    <line x1="14" y1="118" x2="58" y2="118" stroke-width="5"/>
    <line x1="6"  y1="138" x2="62" y2="138" stroke-width="7"/>
    <line x1="20" y1="158" x2="56" y2="158" stroke-width="5"/>
  </g>
  <!-- Legs -->
  <ellipse cx="100" cy="190" rx="14" ry="10" fill="#020617"/>
  <ellipse cx="200" cy="190" rx="14" ry="10" fill="#020617"/>
  <!-- Body -->
  <ellipse cx="150" cy="142" rx="78" ry="40" fill="#0f172a"/>
  <!-- Head -->
  <circle cx="222" cy="128" r="22" fill="#0f172a"/>
  <!-- Hoodie (over head, partial) -->
  <path d="M 192 122
           Q 196 100 222 96
           Q 248 100 252 122
           L 252 138
           Q 240 130 222 130
           Q 204 130 192 138 Z"
        fill="#1c1917"/>
  <!-- Hoodie shadow over face -->
  <path d="M 200 124 Q 222 120 244 124 L 244 134 L 200 134 Z" fill="#0a0a0a"/>
  <!-- Glowing terminal-green eyes -->
  <ellipse cx="216" cy="130" rx="3" ry="2" fill="#22c55e"/>
  <ellipse cx="230" cy="130" rx="3" ry="2" fill="#22c55e"/>
  <!-- Shell (dark with binary) -->
  <path d="M 78 142 A 72 64 0 0 1 222 142 Z" fill="#171717"/>
  <!-- Binary code on shell -->
  <g font-family="ui-monospace, monospace" font-size="11" fill="#22c55e" opacity="0.8">
    <text x="100" y="118">01001000</text>
    <text x="100" y="132">11001010</text>
    <text x="100" y="146">10110011</text>
    <text x="100" y="160">01101001</text>
  </g>
  <!-- Subtle shell rim -->
  <path d="M 78 142 A 72 64 0 0 1 222 142" stroke="#22c55e" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Terminal cursor blink -->
  <rect x="160" y="150" width="6" height="10" fill="#22c55e" opacity="0.9"/>
</svg>
