<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="speedyturtle ninja">
  <title>speedyturtle · ninja</title>
  <rect width="256" height="256" fill="#020617"/>
  <!-- Crossed katanas behind shell -->
  <g stroke-linecap="round">
    <line x1="60" y1="60" x2="240" y2="200" stroke="#cbd5e1" stroke-width="4"/>
    <line x1="240" y1="60" x2="60" y2="200" stroke="#cbd5e1" stroke-width="4"/>
    <!-- Hilts -->
    <rect x="56" y="56" width="14" height="14" fill="#7f1d1d" transform="rotate(-37 63 63)"/>
    <rect x="240" y="60" width="14" height="14" fill="#7f1d1d"/>
  </g>
  <!-- Speed streaks -->
  <g stroke="#dc2626" stroke-linecap="round" fill="none">
    <line x1="14" y1="118" x2="58" y2="118" stroke-width="5"/>
    <line x1="6"  y1="138" x2="62" y2="138" stroke-width="7"/>
    <line x1="20" y1="158" x2="56" y2="158" stroke-width="5"/>
  </g>
  <!-- Legs -->
  <ellipse cx="100" cy="190" rx="14" ry="10" fill="#020617"/>
  <ellipse cx="200" cy="190" rx="14" ry="10" fill="#020617"/>
  <!-- Body -->
  <ellipse cx="150" cy="142" rx="78" ry="40" fill="#0f172a"/>
  <!-- Head -->
  <circle cx="222" cy="128" r="22" fill="#0f172a"/>
  <!-- Headband -->
  <path d="M200 122 Q222 116 244 122 L244 130 Q222 124 200 130 Z" fill="#dc2626"/>
  <!-- Headband tail -->
  <path d="M244 122 L256 110 L252 130 Z" fill="#dc2626"/>
  <!-- Headband emblem (rising sun dot) -->
  <circle cx="222" cy="126" r="3" fill="#fef2f2"/>
  <!-- Ninja eyes -->
  <ellipse cx="218" cy="138" rx="5" ry="3" fill="#fef2f2"/>
  <ellipse cx="232" cy="138" rx="5" ry="3" fill="#fef2f2"/>
  <ellipse cx="218" cy="138" rx="2.5" ry="2" fill="#020617"/>
  <ellipse cx="232" cy="138" rx="2.5" ry="2" fill="#020617"/>
  <!-- Shell (matte dark with red accent) -->
  <path d="M 78 142 A 72 64 0 0 1 222 142 Z" fill="#1c1917"/>
  <path d="M 78 142 A 72 64 0 0 1 222 142" stroke="#dc2626" stroke-width="2.5" fill="none"/>
  <!-- Kanji-style stroke -->
  <g stroke="#dc2626" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9">
    <line x1="130" y1="110" x2="170" y2="110"/>
    <line x1="150" y1="100" x2="150" y2="130"/>
    <line x1="135" y1="125" x2="165" y2="125"/>
  </g>
</svg>
