<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="speedyturtle knight">
  <title>speedyturtle · knight</title>
  <rect width="256" height="256" fill="#1c1917"/>
  <!-- Speed streaks (gold) -->
  <g stroke="#fbbf24" stroke-linecap="round" fill="none" opacity="0.8">
    <line x1="14" y1="118" x2="58" y2="118" stroke-width="5"/>
    <line x1="6"  y1="138" x2="62" y2="138" stroke-width="7"/>
    <line x1="20" y1="158" x2="56" y2="158" stroke-width="5"/>
  </g>
  <!-- Greaves (armored legs) -->
  <ellipse cx="100" cy="190" rx="14" ry="10" fill="#71717a"/>
  <ellipse cx="200" cy="190" rx="14" ry="10" fill="#71717a"/>
  <ellipse cx="100" cy="190" rx="6" ry="4" fill="#a8a29e"/>
  <ellipse cx="200" cy="190" rx="6" ry="4" fill="#a8a29e"/>
  <!-- Body -->
  <ellipse cx="150" cy="142" rx="78" ry="40" fill="#3f3f46"/>
  <!-- Head -->
  <circle cx="222" cy="128" r="22" fill="#3f3f46"/>
  <!-- Helmet (great helm) -->
  <path d="M 200 110
           L 200 134
           Q 200 148 222 150
           Q 244 148 244 134
           L 244 110
           Q 222 102 200 110 Z" fill="#a8a29e"/>
  <!-- Helmet rim -->
  <path d="M 200 110 Q 222 102 244 110" stroke="#71717a" stroke-width="2" fill="none"/>
  <!-- Visor slit -->
  <rect x="206" y="124" width="32" height="3" fill="#0f172a"/>
  <!-- Plume -->
  <path d="M 222 102 Q 220 80 230 70 Q 240 80 240 96 Q 232 100 222 102 Z" fill="#dc2626"/>
  <path d="M 222 102 Q 224 86 232 80" stroke="#fbbf24" stroke-width="1.5" fill="none"/>
  <!-- Plate-armor shell -->
  <path d="M 78 142 A 72 64 0 0 1 222 142 Z" fill="#71717a"/>
  <!-- Plate sections -->
  <g stroke="#3f3f46" stroke-width="2" fill="none">
    <path d="M 100 142 Q 100 110 130 96"/>
    <path d="M 130 142 Q 130 100 150 80"/>
    <path d="M 170 142 Q 170 100 150 80"/>
    <path d="M 200 142 Q 200 110 170 96"/>
  </g>
  <!-- Shield boss (heraldic crest) -->
  <circle cx="150" cy="116" r="14" fill="#fbbf24"/>
  <path d="M 144 116 L 150 108 L 156 116 L 150 124 Z" fill="#dc2626"/>
  <!-- Rivets -->
  <g fill="#a8a29e">
    <circle cx="90" cy="138" r="2"/><circle cx="118" cy="98" r="2"/><circle cx="150" cy="84" r="2"/><circle cx="182" cy="98" r="2"/><circle cx="210" cy="138" r="2"/>
  </g>
  <path d="M 78 142 A 72 64 0 0 1 222 142" stroke="#3f3f46" stroke-width="3" fill="none"/>
</svg>
