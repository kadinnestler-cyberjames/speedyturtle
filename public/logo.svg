<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="speedyturtle mascot">
  <title>speedyturtle · mascot</title>
  <rect width="256" height="256" fill="#ecfdf5"/>
  <!-- Speed streaks -->
  <g stroke="#10b981" stroke-linecap="round" fill="none" opacity="0.6">
    <line x1="14" y1="118" x2="50" y2="118" stroke-width="5"/>
    <line x1="6"  y1="138" x2="50" y2="138" stroke-width="7"/>
    <line x1="14" y1="158" x2="50" y2="158" stroke-width="5"/>
  </g>
  <!-- Tiny feet -->
  <ellipse cx="118" cy="200" rx="14" ry="10" fill="#86efac"/>
  <ellipse cx="190" cy="200" rx="14" ry="10" fill="#86efac"/>
  <!-- Body (chubby) -->
  <ellipse cx="154" cy="152" rx="62" ry="44" fill="#86efac"/>
  <!-- Big head -->
  <circle cx="220" cy="128" r="38" fill="#86efac"/>
  <!-- Cheeks -->
  <circle cx="208" cy="140" r="4" fill="#fb7185" opacity="0.5"/>
  <circle cx="234" cy="140" r="4" fill="#fb7185" opacity="0.5"/>
  <!-- Big sparkly eyes -->
  <circle cx="210" cy="124" r="8" fill="#0f172a"/>
  <circle cx="234" cy="124" r="8" fill="#0f172a"/>
  <circle cx="213" cy="121" r="3" fill="#f8fafc"/>
  <circle cx="237" cy="121" r="3" fill="#f8fafc"/>
  <circle cx="208" cy="127" r="1.5" fill="#f8fafc"/>
  <circle cx="232" cy="127" r="1.5" fill="#f8fafc"/>
  <!-- Smile -->
  <path d="M214 142 Q222 148 230 142" stroke="#0f172a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Shell (rounder, friendlier) -->
  <path d="M 92 152 A 62 56 0 0 1 216 152 Z" fill="#10b981"/>
  <!-- Cute hex pattern -->
  <g fill="#34d399" opacity="0.6">
    <polygon points="124,134 134,128 144,134 144,146 134,152 124,146"/>
    <polygon points="148,128 158,122 168,128 168,140 158,146 148,140"/>
    <polygon points="172,134 182,128 192,134 192,146 182,152 172,146"/>
    <polygon points="138,148 148,142 158,148 158,160 148,166 138,160"/>
    <polygon points="162,148 172,142 182,148 182,160 172,166 162,160"/>
  </g>
  <!-- Shell highlight -->
  <ellipse cx="125" cy="120" rx="18" ry="6" fill="#a7f3d0" opacity="0.8" transform="rotate(-25 125 120)"/>
  <path d="M 92 152 A 62 56 0 0 1 216 152" stroke="#047857" stroke-width="3" fill="none"/>
</svg>
