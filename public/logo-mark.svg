<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="speedyturtle">
  <title>speedyturtle</title>
  <!-- Compact mascot for nav slots — large head + sparkly eyes simplified for legibility under 32px -->
  <ellipse cx="22" cy="50" rx="4" ry="2.5" fill="#86efac"/>
  <ellipse cx="42" cy="50" rx="4" ry="2.5" fill="#86efac"/>
  <ellipse cx="32" cy="40" rx="18" ry="12" fill="#86efac"/>
  <circle cx="50" cy="28" r="11" fill="#86efac"/>
  <!-- Eyes -->
  <circle cx="46" cy="26" r="2.4" fill="#0f172a"/>
  <circle cx="54" cy="26" r="2.4" fill="#0f172a"/>
  <circle cx="47" cy="25" r="1" fill="#f8fafc"/>
  <circle cx="55" cy="25" r="1" fill="#f8fafc"/>
  <!-- Smile -->
  <path d="M48 31 Q50 33 52 31" stroke="#0f172a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Shell -->
  <path d="M 14 40 A 18 16 0 0 1 50 40 Z" fill="#10b981"/>
  <path d="M 17 36 Q 26 28 36 30" stroke="#a7f3d0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Hex shell pattern (just 2 for legibility) -->
  <g fill="#34d399" opacity="0.7">
    <polygon points="22,34 27,31 32,34 32,40 27,43 22,40"/>
    <polygon points="34,34 39,31 44,34 44,40 39,43 34,40"/>
  </g>
  <path d="M 14 40 A 18 16 0 0 1 50 40" stroke="#047857" stroke-width="1.5" fill="none"/>
</svg>
